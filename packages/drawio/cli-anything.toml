name = "drawio"
version = "1.0.0"
binary = "cli-anything-drawio"
description = "Diagram creation and export via draw.io CLI"
repl_default = true
supports_json = true

[backend]
command = "draw.io"
system_package = "draw.io desktop app"
hard_dependency = true

[project]
format = "drawio"
state_file = ".drawio-cli.json"

[skill]
output = "packages/drawio/skills/SKILL.md"
template = "cli-anything-plugin/templates/SKILL.md.template"

[[command_groups]]
name = "diagram"
description = "Diagram project commands"

[[command_groups.commands]]
name = "new"
description = "Create a new diagram"

[[command_groups.commands]]
name = "info"
description = "Inspect the active diagram"

[[command_groups]]
name = "page"
description = "Page management commands"

[[command_groups.commands]]
name = "add"
description = "Add a page"

[[command_groups.commands]]
name = "list"
description = "List pages"

[[command_groups]]
name = "shape"
description = "Shape authoring commands"

[[command_groups.commands]]
name = "add"
description = "Add a shape"

[[command_groups.commands]]
name = "list"
description = "List shapes"

[[command_groups]]
name = "connection"
description = "Connection authoring commands"

[[command_groups.commands]]
name = "add"
description = "Connect two shapes"

[[command_groups.commands]]
name = "list"
description = "List connections"

[[command_groups]]
name = "style"
description = "Style management commands"

[[command_groups.commands]]
name = "apply"
description = "Apply a style"

[[command_groups.commands]]
name = "list"
description = "List available styles"

[[command_groups]]
name = "export"
description = "Export commands"

[[command_groups.commands]]
name = "svg"
description = "Export diagram as SVG"

[[command_groups.commands]]
name = "png"
description = "Export diagram as PNG"

[[command_groups.commands]]
name = "pdf"
description = "Export diagram as PDF"

[[command_groups]]
name = "session"
description = "Session management commands"

[[command_groups.commands]]
name = "status"
description = "Show current session"

[[command_groups.commands]]
name = "undo"
description = "Undo the last action"

[[command_groups.commands]]
name = "redo"
description = "Redo the last undone action"

[[command_groups.commands]]
name = "history"
description = "List recorded actions"

[[command_groups.commands]]
name = "save"
description = "Mark the session clean"

[[examples]]
title = "Create diagram"
description = "Create a new diagram session."
code = "cli-anything-drawio diagram new --name architecture --template flowchart"

[[examples]]
title = "Add rectangle"
description = "Add a rectangle shape to the current page."
code = "cli-anything-drawio shape add --kind rectangle --x 120 --y 80"
